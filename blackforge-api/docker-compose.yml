# Local development stack: API + Postgres + Redis.
#
# For everyday coding you'll usually run Postgres+Redis here and the API on the
# host with `npm run dev` (faster reloads). To run the full containerized stack:
#   docker compose up --build
#
# Note: this uses a LOCAL Postgres (not Neon) so you can develop offline. The API
# container points at it via the `bfapi` schema, mirroring production isolation.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: blackforge
      POSTGRES_PASSWORD: blackforge
      POSTGRES_DB: blackforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackforge -d blackforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4000"
      CORS_ORIGIN: "*"
      DATABASE_URL: "postgresql://blackforge:blackforge@postgres:5432/blackforge?schema=bfapi"
      DATABASE_URL_UNPOOLED: "postgresql://blackforge:blackforge@postgres:5432/blackforge?schema=bfapi"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "dev-access-secret-change-me-please-32"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-me-please-32"
    ports:
      - "4000:4000"

volumes:
  pgdata:
