name: CI

on:
  push:
    branches: [main]
    paths:
      - "blackforge-api/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "blackforge-api/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: blackforge-api

jobs:
  build:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blackforge-api/package-lock.json

      # Runs postinstall → `prisma generate` (no database needed).
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          # Validated by src/config/env.ts at boot; tests don't hit real services.
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test?schema=bfapi
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-access-secret-at-least-16-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-16-chars

      - name: Build
        run: npm run build
